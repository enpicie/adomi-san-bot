name: Dev Pipeline

on:
  push:
    branches-ignore:
      - main
    tags:
      - '!*'
  workflow_dispatch:
    inputs:
      run_register_commands:
        description: 'Run Discord command registration after deployment'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: write

jobs:
  read-config:
    runs-on: ubuntu-latest
    outputs:
      APP_NAME: ${{ steps.set-vars.outputs.APP_NAME }}
      SQS_WORKER_NAME: ${{ steps.set-vars.outputs.SQS_WORKER_NAME }}
      SCHEDULED_JOB_NAME: ${{ steps.set-vars.outputs.SCHEDULED_JOB_NAME }}
      STARTGG_OAUTH_NAME: ${{ steps.set-vars.outputs.STARTGG_OAUTH_NAME }}
      SHEETS_AGENT_NAME: ${{ steps.set-vars.outputs.SHEETS_AGENT_NAME }}
      GOOGLE_SHEETS_SECRET_NAME: ${{ steps.set-vars.outputs.GOOGLE_SHEETS_SECRET_NAME }}
      AWS_REGION: ${{ steps.set-vars.outputs.AWS_REGION }}
      PYTHON_RUNTIME: ${{ steps.set-vars.outputs.PYTHON_RUNTIME }}
      DISCORD_PUBLIC_KEY: ${{ steps.set-vars.outputs.DISCORD_PUBLIC_KEY }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ steps.set-vars.outputs.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      BRANCH_NAME: ${{ steps.set-vars.outputs.BRANCH_NAME }}
    steps:
      - uses: actions/checkout@v5
      - name: Load config
        id: set-vars
        run: |
          set -a
          source ./config.env
          set +a
          SHORT_BRANCH_NAME="${GITHUB_REF_NAME##*/}"
          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT
          echo "SQS_WORKER_NAME=$SQS_WORKER_NAME" >> $GITHUB_OUTPUT
          echo "SCHEDULED_JOB_NAME=$SCHEDULED_JOB_NAME" >> $GITHUB_OUTPUT
          echo "STARTGG_OAUTH_NAME=$STARTGG_OAUTH_NAME" >> $GITHUB_OUTPUT
          echo "SHEETS_AGENT_NAME=$SHEETS_AGENT_NAME" >> $GITHUB_OUTPUT
          echo "GOOGLE_SHEETS_SECRET_NAME=$GOOGLE_SHEETS_SECRET_NAME" >> $GITHUB_OUTPUT
          echo "AWS_REGION=$AWS_REGION" >> $GITHUB_OUTPUT
          echo "PYTHON_RUNTIME=$PYTHON_RUNTIME" >> $GITHUB_OUTPUT
          echo "DISCORD_PUBLIC_KEY=$DISCORD_PUBLIC_KEY_DEV" >> $GITHUB_OUTPUT
          echo "GOOGLE_SERVICE_ACCOUNT_EMAIL=$GOOGLE_SERVICE_ACCOUNT_EMAIL" >> $GITHUB_OUTPUT
          echo "BRANCH_NAME=$SHORT_BRANCH_NAME" >> $GITHUB_OUTPUT

  unit-test:
    needs:
      - read-config
    uses: ./.github/workflows/workflow-run-unit-tests.yml
    with:
      python_runtime: ${{ needs.read-config.outputs.PYTHON_RUNTIME }}

  deploy:
    needs:
      - read-config
      - unit-test
    uses: ./.github/workflows/workflow-deploy.yml
    with:
      app_name: ${{ needs.read-config.outputs.APP_NAME }}
      sqs_worker_name: ${{ needs.read-config.outputs.SQS_WORKER_NAME }}
      scheduled_job_name: ${{ needs.read-config.outputs.SCHEDULED_JOB_NAME }}
      startgg_oauth_name: ${{ needs.read-config.outputs.STARTGG_OAUTH_NAME }}
      sheets_agent_name: ${{ needs.read-config.outputs.SHEETS_AGENT_NAME }}
      aws_region: ${{ needs.read-config.outputs.AWS_REGION }}
      python_runtime: ${{ needs.read-config.outputs.PYTHON_RUNTIME }}
      discord_public_key: ${{ needs.read-config.outputs.DISCORD_PUBLIC_KEY }}
      google_service_account_email: ${{ needs.read-config.outputs.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      app_version: ${{ needs.read-config.outputs.BRANCH_NAME }}
      deployment_env: 'dev'
      artifact_s3_bucket: 'enpicie-dev-lambda-artifacts'
      google_sheets_secret_name: ${{ needs.read-config.outputs.GOOGLE_SHEETS_SECRET_NAME }}
    secrets:
      AWS_ROLE_ARN_LAMBDA_APIGW_DDB_SQS: ${{ secrets.AWS_ROLE_ARN_LAMBDA_APIGW_DDB_SQS }}
      AWS_ROLE_ARN_EVENTBRIDGE_LAMBDA_DDB_SQS: ${{ secrets.AWS_ROLE_ARN_EVENTBRIDGE_LAMBDA_DDB_SQS }}
      AWS_ROLE_ARN_S3: ${{ secrets.AWS_ROLE_ARN_S3 }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN_DEV }}
      STARTGG_API_KEY: ${{ secrets.STARTGG_API_KEY }}
      STARTGG_OAUTH_CLIENT_ID: ${{ secrets.STARTGG_OAUTH_CLIENT_ID_DEV }}
      STARTGG_OAUTH_CLIENT_SECRET: ${{ secrets.STARTGG_OAUTH_CLIENT_SECRET_DEV }}

  register-commands:
    needs: deploy
    if: ${{ github.event.inputs.run_register_commands == 'true' || github.event.inputs.run_register_commands == true }}
    uses: ./.github/workflows/workflow-register-commands.yml
    with:
      environment: 'dev'
      command_name: 'all'
    secrets:
      DISCORD_BOT_TOKEN_DEV: ${{ secrets.DISCORD_BOT_TOKEN_DEV }}
      DISCORD_BOT_TOKEN_PROD: ${{ secrets.DISCORD_BOT_TOKEN_PROD }}
